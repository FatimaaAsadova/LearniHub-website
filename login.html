<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Learnihub</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    * { transition: all 0.3s ease; }
    input:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }
  </style>
</head>

<body class="bg-gray-50">

  <header class="bg-white shadow-md border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
      <h1 class="text-2xl font-bold text-indigo-600"><a href="index.html">Learnihub</a></h1>
      <nav class="hidden md:flex items-center gap-6">
        <a href="index.html" class="text-gray-700 hover:text-indigo-600 font-medium">Home</a>
        <a href="courses.html" class="text-gray-700 hover:text-indigo-600 font-medium">Courses</a>
        <a href="survey.html" class="text-gray-700 hover:text-indigo-600 font-medium">Survey</a>
        <a href="register.html" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-medium">Sign Up</a>
      </nav>
    </div>
  </header>

  <main class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
      <div class="bg-white rounded-xl shadow-lg p-8 border border-gray-100">

        <div class="text-center mb-8">
          <h1 class="text-3xl font-bold text-gray-900 leading-tight">Welcome Back</h1>
          <p class="text-gray-500 mt-2 italic">Sign in to your Learnihub account</p>
        </div>

        <form id="loginForm" class="space-y-5">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Email Address</label>
            <input type="email" id="email" placeholder="you@example.com"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:border-indigo-500 transition-all" required>
          </div>

          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
            <input type="password" id="password" placeholder="••••••••"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:border-indigo-500 transition-all" required>
          </div>

          <div id="message" class="text-center text-sm font-medium hidden"></div>

          <button type="submit" id="loginBtn"
            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg shadow-md transform hover:-translate-y-1 active:scale-95 transition-all">
            Sign In
          </button>
        </form>

        <p class="text-center text-gray-500 mt-6 text-sm">
          Don't have an account?
          <a href="register.html" class="text-indigo-600 font-bold hover:underline">Create one</a>
        </p>
      </div>
    </div>
  </main>

  <footer class="bg-gray-900 text-gray-400 py-6 mt-12">
    <div class="max-w-7xl mx-auto px-4 text-center text-xs">
      <p>&copy; 2026 Learnihub. All rights reserved.</p>
    </div>
  </footer>

  <script>
    const loginForm = document.getElementById('loginForm');
    const messageDiv = document.getElementById('message');
    const loginBtn = document.getElementById('loginBtn');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      loginBtn.disabled = true;
      loginBtn.innerText = "Verifying...";
      messageDiv.classList.add('hidden');

      try {
        // Render linkini bura əlavə etdik
        const response = await fetch('https://learnihub-backend.onrender.com/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const result = await response.json();

        if (response.ok) {
          messageDiv.innerText = "✅ Login successful! Redirecting...";
          messageDiv.className = "text-center text-sm font-medium text-green-600 mb-4";
          messageDiv.classList.remove('hidden');

          // Sessiya məlumatlarını yadda saxlayırıq
          localStorage.setItem('isLoggedIn', 'true'); // Bu nişanı yoxlayacağıq
          localStorage.setItem('user', JSON.stringify(result.user));

          // Immediate redirect without setTimeout
          window.location.replace('courses.html');

        } else {
          messageDiv.innerText = "❌ " + result.error;
          messageDiv.className = "text-center text-sm font-medium text-red-600 mb-4";
          messageDiv.classList.remove('hidden');
        }
      } catch (err) {
        messageDiv.innerText = "❌ Connection error! Please try again later.";
        messageDiv.className = "text-center text-sm font-medium text-red-600 mb-4";
        messageDiv.classList.remove('hidden');
      } finally {
        loginBtn.disabled = false;
        loginBtn.innerText = "Sign In";
      }
    });
  </script>

</body>
</html>
