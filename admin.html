<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Survey submissions</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    const hasSession = localStorage.getItem('isLoggedIn') === 'true';
    if (!hasSession) {
      window.location.replace('login.html');
    }
  </script>
  <!--
    Supabase: create the table (SQL editor) if it does not exist:

    create table public.survey_submissions (
      id uuid primary key default gen_random_uuid(),
      name text,
      email text,
      answer1 text,
      answer2 text,
      created_at timestamptz not null default now()
    );

    alter table public.survey_submissions enable row level security;

    create policy "survey_insert_own"
      on public.survey_submissions for insert to authenticated
      with check (true);

    create policy "survey_select_authenticated"
      on public.survey_submissions for select to authenticated
      using (true);

    (Tighten policies for production, e.g. only specific admin emails.)
  -->
</head>
<body class="bg-white" data-auth-page="admin">
  <div class="flex flex-col h-screen md:flex-row">
    <aside class="flex flex-col w-64 h-screen px-4 py-8 overflow-y-auto bg-white border-r border-gray-200">
      <h2 class="text-3xl font-semibold text-indigo-600 px-5">
        <a href="index.html">Learnihub</a>
      </h2>
      <div class="flex flex-col justify-between flex-1 mt-6">
        <nav>
          <a class="flex items-center px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg" href="courses.html">
            <span class="mx-4 font-medium">My Courses</span>
          </a>
          <a class="flex items-center px-4 py-2 mt-5 text-gray-600 hover:bg-gray-100 rounded-lg" href="survey.html">
            <span class="mx-4 font-medium">Submit Course</span>
          </a>
          <a class="flex items-center px-4 py-2 mt-5 text-gray-700 bg-gray-100 rounded-lg" href="admin.html">
            <span class="mx-4 font-medium">Admin</span>
          </a>
          <a class="flex items-center px-4 py-2 mt-5 text-gray-600 hover:bg-gray-100 rounded-lg" href="index.html">
            <span class="mx-4 font-medium">Home Page</span>
          </a>
        </nav>
        <div class="mt-6 border-t pt-6 px-4">
          <p class="text-sm text-gray-600">User</p>
          <p id="userEmail" class="text-sm font-medium text-gray-900 truncate italic"></p>
          <button type="button" id="logoutBtn" class="w-full text-left py-2 mt-2 text-red-600 font-bold hover:bg-red-50 rounded-lg transition">
            Logout
          </button>
        </div>
      </div>
    </aside>

    <main class="flex-1 h-screen overflow-y-auto bg-gray-50 p-6 lg:p-10">
      <div class="max-w-7xl mx-auto">
        <div class="mb-6 flex items-center justify-between gap-3 flex-wrap">
          <div>
            <h2 class="text-2xl font-bold text-gray-900">Survey submissions</h2>
            <p class="text-gray-600 text-sm mt-1">Data from Supabase table <code class="bg-gray-100 px-1 rounded">survey_submissions</code>.</p>
          </div>
          <button type="button" id="adminRefreshBtn" class="px-4 py-2 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 text-sm font-medium">
            Refresh
          </button>
        </div>

        <p id="adminLoading" class="text-gray-600 text-sm mb-4">Loading…</p>
        <p id="adminError" class="hidden text-red-600 text-sm mb-4 p-3 bg-red-50 rounded-lg border border-red-100"></p>

        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-x-auto">
          <table class="min-w-full text-left">
            <thead>
              <tr class="bg-gray-100 border-b border-gray-200">
                <th class="px-4 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wide">Name</th>
                <th class="px-4 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wide">Email</th>
                <th class="px-4 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wide">Answer 1</th>
                <th class="px-4 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wide">Answer 2</th>
                <th class="px-4 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wide">Created at</th>
              </tr>
            </thead>
            <tbody id="adminSubmissionsBody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
