<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Survey submissions</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!--
    Supabase: create the table (SQL editor) if it does not exist:

    create table public.survey_submissions (
      id uuid primary key default gen_random_uuid(),
      name text,
      email text,
      answer1 text,
      answer2 text,
      created_at timestamptz not null default now()
    );

    alter table public.survey_submissions enable row level security;

    create policy "survey_insert_own"
      on public.survey_submissions for insert to authenticated
      with check (true);

    create policy "survey_select_authenticated"
      on public.survey_submissions for select to authenticated
      using (true);

    (Tighten policies for production, e.g. only specific admin emails.)
  -->
</head>
<body class="bg-gray-50 min-h-screen" data-auth-page="admin">
  <header class="bg-white shadow-md border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 py-4 flex flex-wrap items-center justify-between gap-4">
      <h1 class="text-2xl font-bold text-indigo-600"><a href="index.html">Learnihub</a></h1>
      <nav class="flex items-center gap-4 flex-wrap">
        <a href="dashboard.html" class="text-gray-700 hover:text-indigo-600 text-sm font-medium">Dashboard</a>
        <span class="text-gray-600 text-sm">User: <strong id="userEmail" class="text-gray-900"></strong></span>
        <button type="button" id="adminRefreshBtn" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 text-sm font-medium">
          Refresh
        </button>
        <button type="button" id="logoutBtn" class="px-4 py-2 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300 text-sm font-medium">
          Log out
        </button>
      </nav>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-8">
    <div class="mb-6">
      <h2 class="text-2xl font-bold text-gray-900">Survey submissions</h2>
      <p class="text-gray-600 text-sm mt-1">Data from Supabase table <code class="bg-gray-100 px-1 rounded">survey_submissions</code>.</p>
    </div>

    <p id="adminLoading" class="text-gray-600 text-sm mb-4">Loading…</p>
    <p id="adminError" class="hidden text-red-600 text-sm mb-4 p-3 bg-red-50 rounded-lg border border-red-100"></p>

    <div class="bg-white rounded-lg shadow border border-gray-100 overflow-x-auto">
      <table class="min-w-full text-left">
        <thead>
          <tr class="bg-gray-100 border-b border-gray-200">
            <th class="px-4 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wide">Name</th>
            <th class="px-4 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wide">Email</th>
            <th class="px-4 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wide">Answer 1</th>
            <th class="px-4 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wide">Answer 2</th>
            <th class="px-4 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wide">Created at</th>
          </tr>
        </thead>
        <tbody id="adminSubmissionsBody"></tbody>
      </table>
    </div>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
