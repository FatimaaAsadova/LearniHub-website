<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learnihub | Profil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { background-color: #fdfaf5; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; color: #1A1A1A; }
        .neo-card { background: white; border: 2.5px solid #2D2D2D; border-radius: 24px; box-shadow: 4px 4px 0px 0px #2D2D2D; }
        .calendar-container { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .calendar-day { font-size: 11px; font-weight: 700; padding: 8px 0; border-radius: 10px; transition: all 0.2s; }
        .day-name { font-size: 10px; font-weight: 800; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; }
        .today-highlight { background-color: #fef08a; border: 2px solid #2D2D2D; }
        .deadline-circle { width: 30px; height: 30px; background-color: #10b981; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: auto; border: 2px solid #2D2D2D; font-weight: 900; }
        .lang-btn.active { background-color: #2D2D2D; color: white; }
        .course-item-mini { display: flex; justify-content: space-between; align-items: center; padding: 12px; border: 2px solid #2D2D2D; border-radius: 16px; margin-bottom: 10px; background: white; transition: all 0.2s; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <a href="courses.html" class="flex items-center gap-2 text-[10px] font-black uppercase tracking-widest hover:text-indigo-600">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> <span data-key="back">Geri Qayıt</span>
            </a>
            <div class="neo-card p-1 flex gap-1 bg-white">
                <button onclick="changeLanguage('az')" id="optAz" class="lang-btn px-4 py-1 text-[10px] font-black rounded-lg">AZ</button>
                <button onclick="changeLanguage('en')" id="optEn" class="lang-btn px-4 py-1 text-[10px] font-black rounded-lg">EN</button>
            </div>
        </div>

        <div class="neo-card p-8 mb-8 flex flex-col md:flex-row items-center justify-between gap-6">
            <div class="flex items-center gap-6">
                <div id="userAvatar" class="w-20 h-20 bg-indigo-500 border-2 border-slate-900 rounded-full flex items-center justify-center text-3xl font-black text-white italic shadow-[4px_4px_0px_0px_#2D2D2D]">U</div>
                <div>
                    <h2 id="fullNameDisplay" class="text-2xl font-black italic">---</h2>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1" data-key="member_status">Learnihub Pro Üzvü</p>
                </div>
            </div>
            <div class="flex gap-10 text-center md:text-right">
                <div><p class="text-[9px] font-black text-slate-400 uppercase mb-1" data-key="status">Status</p><p class="text-sm font-black text-emerald-500" data-key="active">Aktiv</p></div>
                <div class="border-l-2 border-slate-100 pl-10"><p class="text-[9px] font-black text-slate-400 uppercase mb-1" data-key="membership">Üzvlük</p><p class="text-sm font-black">May 2026</p></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-3 space-y-6">
                <div class="neo-card p-6">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase mb-6 tracking-widest" data-key="personal_info">Şəxsi Məlumat</h3>
                    <div class="space-y-4">
                        <div class="border-b border-dashed border-slate-100 pb-3"><p class="text-[8px] font-black text-slate-400 uppercase" data-key="username">İstifadəçi adı</p><p id="usernameDisplay" class="text-xs font-bold truncate">---</p></div>
                        <div class="border-b border-dashed border-slate-100 pb-3"><p class="text-[8px] font-black text-slate-400 uppercase">Email</p><p id="emailDisplay" class="text-xs font-bold truncate">---</p></div>
                        <div><p class="text-[8px] font-black text-slate-400 uppercase" data-key="location">Məkan</p><p class="text-xs font-bold">Baku, Azerbaijan</p></div>
                    </div>
                    <button id="logoutBtn" class="w-full mt-8 py-4 bg-red-500 text-white border-2 border-slate-900 rounded-2xl text-[10px] font-black uppercase shadow-[4px_4px_0px_0px_#2d2d2d] active:shadow-none active:translate-y-1 transition-all" data-key="logout">Çıxış Et</button>
                </div>
            </div>
            <div class="lg:col-span-5">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xs font-black uppercase tracking-widest" data-key="selected_courses">Seçilmiş Kurslar</h3>
                    <div id="courseCount" class="w-8 h-8 bg-white border-2 border-slate-900 rounded-lg flex items-center justify-center font-black text-xs">0</div>
                </div>
                <div id="selectedCoursesList" class="space-y-3"></div>
            </div>
            <div class="lg:col-span-4 space-y-6">
                <div class="neo-card p-6">
                    <div class="flex justify-between items-center mb-6">
                        <button onclick="changeMonth(-1)" class="w-8 h-8 flex items-center justify-center border-2 border-slate-900 rounded-lg hover:bg-slate-100 transition-all"> < </button>
                        <h3 id="monthYearDisplay" class="font-black text-sm uppercase tracking-widest">---</h3>
                        <button onclick="changeMonth(1)" class="w-8 h-8 flex items-center justify-center border-2 border-slate-900 rounded-lg hover:bg-slate-100 transition-all"> > </button>
                    </div>
                    <div class="calendar-container" id="calendarHeader"></div>
                    <div id="calendarDays" class="calendar-container mt-2"></div>
                    <div class="mt-10 pt-6 border-t-2 border-slate-100">
                        <h4 class="text-[9px] font-black text-slate-400 uppercase mb-4 tracking-widest" data-key="upcoming_deadlines">Yaxınlaşan Tarixlər</h4>
                        <div id="deadlinesList" class="space-y-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUBAPASE_URL = "https://sqgphrdkthiixeikialy.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_ysE34rB_P609-Mw6u_Tcug_JNZRylrq"; 
        const _supabase = supabase.createClient(SUBAPASE_URL, SUPABASE_KEY);

        let currentLang = localStorage.getItem('preferredLang') || 'az';
        let selectedCoursesData = [];
        let viewDate = new Date();

        const translations = {
            az: {
                back: "Geri Qayıt", member_status: "Learnihub Pro Üzvü", status: "Status", active: "Aktiv", membership: "Üzvlük",
                personal_info: "Şəxsi Məlumat", username: "İstifadəçi adı", location: "Məkan", logout: "Çıxış Et",
                selected_courses: "Seçilmiş Kurslar", upcoming_deadlines: "Yaxınlaşan Tarixlər", empty: "Kurs əlavə edilməyib.",
                cat_intern: "Təcrübə", cat_summer: "Yay Proqramı", cat_math: "Riyaziyyat", cat_prog: "Proqramlaşdırma", cat_general: "Ümumi",
                days: ["BE", "ÇA", "ÇƏ", "CA", "CÜ", "ŞƏ", "BA"],
                months: ["Yanvar", "Fevral", "Mart", "Aprel", "May", "İyun", "İyul", "Avqust", "Sentyabr", "Oktyabr", "Noyabr", "Dekabr"]
            },
            en: {
                back: "Go Back", member_status: "Learnihub Pro Member", status: "Status", active: "Active", membership: "Membership",
                personal_info: "Personal Info", username: "Username", location: "Location", logout: "Logout",
                selected_courses: "Selected Courses", upcoming_deadlines: "Upcoming Deadlines", empty: "No courses added.",
                cat_intern: "Internship", cat_summer: "Summer Program", cat_math: "Mathematics", cat_prog: "Programming", cat_general: "General",
                days: ["MO", "TU", "WE", "TH", "FR", "SA", "SU"],
                months: ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"]
            }
        };

        async function init() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) { window.location.replace('login.html'); return; }
            const user = session.user;
            document.getElementById('emailDisplay').innerText = user.email;
            document.getElementById('usernameDisplay').innerText = user.email.split('@')[0];
            document.getElementById('fullNameDisplay').innerText = user.user_metadata?.full_name || "User";
            document.getElementById('userAvatar').innerText = (user.user_metadata?.full_name || "U")[0].toUpperCase();
            await loadData();
            updateStaticText();
        }

        async function loadData() {
            const selectedIds = JSON.parse(localStorage.getItem('selectedCourses')) || [];
            if (selectedIds.length === 0) {
                document.getElementById('courseCount').innerText = "0";
                document.getElementById('selectedCoursesList').innerHTML = `<p class='text-center py-10 text-slate-400 font-bold text-xs uppercase italic'>${translations[currentLang].empty}</p>`;
                document.getElementById('deadlinesList').innerHTML = "";
                selectedCoursesData = [];
                renderCalendar();
                return;
            }
            const { data, error } = await _supabase.from('courses').select('*').in('id', selectedIds);
            if (error) { console.error("Xəta:", error.message); return; }
            if (data) {
                selectedCoursesData = data;
                document.getElementById('courseCount').innerText = selectedCoursesData.length;
                renderUI();
            }
        }

        function renderUI() {
            const listContainer = document.getElementById('selectedCoursesList');
            const deadlinesContainer = document.getElementById('deadlinesList');
            const t = translations[currentLang];
            listContainer.innerHTML = '';
            deadlinesContainer.innerHTML = '';
            selectedCoursesData.forEach(course => {
                const title = currentLang === 'en' ? (course.title_en || course.title) : (course.title_az || course.title);
                let displayCat = course.category || (currentLang === 'en' ? 'General' : 'Ümumi');
                const rawCat = String(course.category || '').trim().toLowerCase();
                if (rawCat.includes('internship')) displayCat = t.cat_intern;
                else if (rawCat.includes('summer program')) displayCat = t.cat_summer;
                else if (rawCat.includes('mathematics')) displayCat = t.cat_math;
                else if (rawCat.includes('programming')) displayCat = t.cat_prog;
                else if (rawCat.includes('general')) displayCat = t.cat_general;
                listContainer.innerHTML += `<div class="course-item-mini"><div><h4 class="font-black text-xs">${title}</h4><p class="text-[8px] font-bold text-indigo-500 uppercase mt-1">${displayCat}</p></div><div class="flex gap-2"><button onclick="removeCourse('${course.id}')" class="w-8 h-8 rounded-lg border-2 border-red-500 text-red-500 flex items-center justify-center hover:bg-red-500 hover:text-white transition-all shadow-[2px_2px_0px_0px_#ef4444]"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg></button><a href="${course.link}" target="_blank" class="w-8 h-8 rounded-lg border-2 border-slate-900 flex items-center justify-center hover:bg-slate-900 hover:text-white transition-all shadow-[2px_2px_0px_0px_#2D2D2D]"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M7 17L17 7M7 7h10v10"/></svg></a></div></div>`;
                if (course.deadline) { deadlinesContainer.innerHTML += `<div class="flex justify-between items-center border-b border-dashed border-slate-100 pb-2"><div class="flex items-center gap-2"><div class="w-1.5 h-1.5 bg-slate-900 rounded-full"></div><span class="text-[10px] font-bold text-slate-700 truncate max-w-[150px]">${title}</span></div><span class="text-[9px] font-black text-red-500">${course.deadline}</span></div>`; }
            });
            renderCalendar();
        }

        async function removeCourse(id) {
            let selected = JSON.parse(localStorage.getItem('selectedCourses')) || [];
            selected = selected.filter(item => String(item) !== String(id));
            localStorage.setItem('selectedCourses', JSON.stringify(selected));
            await loadData();
        }

        function renderCalendar() {
            const container = document.getElementById('calendarDays');
            const header = document.getElementById('calendarHeader');
            const monthDisplay = document.getElementById('monthYearDisplay');
            container.innerHTML = '';
            header.innerHTML = translations[currentLang].days.map(d => `<div class="day-name">${d}</div>`).join('');
            const year = viewDate.getFullYear();
            const month = viewDate.getMonth();
            const today = new Date();
            monthDisplay.innerText = `${translations[currentLang].months[month]} ${year}`;
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const offset = firstDay === 0 ? 6 : firstDay - 1;
            const deadlineDays = selectedCoursesData.filter(c => c.deadline).map(c => { const d = new Date(c.deadline); return d.getMonth() === month && d.getFullYear() === year ? d.getDate() : null; });
            for (let i = 0; i < offset; i++) container.innerHTML += `<div></div>`;
            for (let d = 1; d <= daysInMonth; d++) {
                const isToday = today.getDate() === d && today.getMonth() === month && today.getFullYear() === year;
                const isDeadline = deadlineDays.includes(d);
                container.innerHTML += `<div class="calendar-day ${isToday ? 'today-highlight' : ''}">${isDeadline ? `<div class="deadline-circle">${d}</div>` : d}</div>`;
            }
        }

        function changeMonth(dir) { viewDate.setMonth(viewDate.getMonth() + dir); renderCalendar(); }

        function changeLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('preferredLang', lang);
            updateStaticText();
            renderUI();
        }

        function updateStaticText() {
            const t = translations[currentLang];
            document.querySelectorAll('[data-key]').forEach(el => { const key = el.getAttribute('data-key'); if (t[key]) el.innerText = t[key]; });
            document.getElementById('optAz').classList.toggle('active', currentLang === 'az');
            document.getElementById('optEn').classList.toggle('active', currentLang === 'en');
        }

        document.getElementById('logoutBtn').onclick = async () => {
            await _supabase.auth.signOut();
            localStorage.removeItem('loggedInUser');
            localStorage.removeItem('sb-sqgphrdkthiixeikialy-auth-token');
            window.location.replace('login.html');
        };

        init();
    </script>
</body>
</html>
