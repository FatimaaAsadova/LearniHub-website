<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard — Learni</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50 min-h-screen" data-auth-page="main-dashboard">
    <div class="min-h-screen flex items-center justify-center p-4">
      <div class="w-full max-w-2xl bg-white rounded-lg shadow p-8">
        <div class="flex items-center justify-between flex-wrap gap-4">
          <h1 class="text-2xl font-semibold text-gray-800">Dashboard</h1>
          <button type="button" id="logoutBtn" class="py-2 px-4 bg-red-500 text-white rounded-md hover:bg-red-600">Logout</button>
        </div>
        <div class="mt-6">
          <p class="text-gray-700">Signed in as <span id="userEmail" class="font-medium"></span></p>
          <p class="mt-4 text-gray-600">Protected with your Supabase account.</p>
          <p class="mt-4"><a href="index.html" class="text-indigo-600 hover:underline">← Back to home</a></p>
        </div>
      </div>
    </div>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
