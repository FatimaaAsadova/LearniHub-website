<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact — Learnihub</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
  <header class="bg-white shadow-md border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
      <h1 class="text-2xl font-bold text-indigo-600"><a href="index.html" class="hover:text-indigo-700">Learnihub</a></h1>
      <nav class="flex items-center gap-6">
        <a href="index.html" class="text-gray-700 hover:text-indigo-600 font-medium">Home</a>
        <a href="courses.html" class="text-gray-700 hover:text-indigo-600 font-medium">Courses</a>
        <a href="survey.html" class="text-gray-700 hover:text-indigo-600 font-medium">Survey</a>
        <a href="contact.html" class="text-gray-700 hover:text-indigo-600 font-medium">Contact</a>
      </nav>
    </div>
  </header>

  <main class="max-w-3xl mx-auto p-8">
    <h2 class="text-3xl font-bold mb-6">Contact Us</h2>
    <p class="text-gray-600 mb-6">Your message is saved through our backend API for follow-up.</p>
    <form id="contactForm" class="space-y-4 bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
      <div>
        <label class="block text-sm font-semibold text-gray-900 mb-2">Name</label>
        <input id="contactName" type="text" required class="w-full px-4 py-2 border border-gray-300 rounded-lg">
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-900 mb-2">Email</label>
        <input id="contactEmail" type="email" required class="w-full px-4 py-2 border border-gray-300 rounded-lg">
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-900 mb-2">Message</label>
        <textarea id="contactMessage" required rows="6" class="w-full px-4 py-2 border border-gray-300 rounded-lg"></textarea>
      </div>
      <div id="contactMessageState" class="hidden text-sm font-medium rounded-lg p-3"></div>
      <button id="contactSubmitBtn" type="submit" class="px-6 py-3 bg-indigo-600 text-white rounded-lg">Send Message</button>
    </form>
  </main>

  <script>
    const API_BASE = 'https://learnihub-backend.onrender.com';
    const contactForm = document.getElementById('contactForm');
    const stateBox = document.getElementById('contactMessageState');
    const submitBtn = document.getElementById('contactSubmitBtn');

    contactForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';
      stateBox.className = 'hidden';

      const payload = {
        name: document.getElementById('contactName').value.trim(),
        email: document.getElementById('contactEmail').value.trim(),
        message: document.getElementById('contactMessage').value.trim()
      };

      if (!payload.name || !payload.email || !payload.message) {
        stateBox.textContent = 'Please fill in all fields.';
        stateBox.className = 'block text-sm font-medium rounded-lg p-3 bg-red-50 text-red-700';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send Message';
        return;
      }

      try {
        const response = await fetch(API_BASE + '/api/contact', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const result = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(result.error || 'Unable to submit your message right now.');
        }

        stateBox.textContent = 'Message sent successfully. Our team will contact you soon.';
        stateBox.className = 'block text-sm font-medium rounded-lg p-3 bg-green-50 text-green-700';
        contactForm.reset();
      } catch (error) {
        console.error('Contact submit error:', error);
        stateBox.textContent = error.message || 'Request failed.';
        stateBox.className = 'block text-sm font-medium rounded-lg p-3 bg-red-50 text-red-700';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send Message';
      }
    });
  </script>
</body>
</html>
