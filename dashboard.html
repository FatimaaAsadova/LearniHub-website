<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Courses Dashboard — Learnihub</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
  <header class="bg-white border-b border-gray-200 sticky top-0 z-30">
    <div class="max-w-7xl mx-auto px-4 py-4 flex flex-wrap items-center justify-between gap-3">
      <a href="index.html" class="text-2xl font-bold text-indigo-600">Learnihub</a>
      <nav class="flex items-center gap-4 text-sm font-medium">
        <a href="index.html" class="text-gray-700 hover:text-indigo-600">Home</a>
        <a href="courses.html" class="text-indigo-600">Courses</a>
        <a href="survey.html" class="text-gray-700 hover:text-indigo-600">Survey</a>
        <a href="contact.html" class="text-gray-700 hover:text-indigo-600">Contact</a>
        <span class="text-gray-600">User: <strong id="userNameDisplay" class="text-gray-900">-</strong></span>
        <button id="logoutBtn" class="px-3 py-2 bg-red-50 text-red-600 rounded-lg hover:bg-red-100">Logout</button>
      </nav>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-10">
    <section class="bg-white border border-gray-200 rounded-2xl shadow-sm p-8 mb-6">
      <h1 class="text-3xl font-bold text-gray-900">Professional Course Catalog</h1>
      <p class="mt-2 text-gray-600">Live data from backend with resilient fallback and fast filtering.</p>
    </section>

    <section class="bg-white border border-gray-200 rounded-2xl shadow-sm p-6 mb-6">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
        <input id="searchInput" type="text" placeholder="Search courses..." class="px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-300">
        <select id="categoryFilter" class="px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-300">
          <option value="">All Categories</option>
        </select>
        <button id="clearBtn" class="px-4 py-3 rounded-lg bg-gray-100 hover:bg-gray-200 font-semibold text-gray-700">Clear Filters</button>
      </div>
      <p id="searchResults" class="mt-3 text-sm text-gray-500">Loading courses...</p>
    </section>

    <section id="coursesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></section>
  </main>

  <script>
    const API_BASE = 'https://learnihub-backend.onrender.com';
    const fallbackCourses = [
      { title: 'Web Development Fundamentals', description: 'Learn HTML, CSS, JavaScript, and best practices.', category: 'development', link: '#', duration: '6 weeks' },
      { title: 'UI Design Systems', description: 'Create scalable and consistent design systems.', category: 'design', link: '#', duration: '4 weeks' },
      { title: 'Data Analysis Essentials', description: 'Understand data workflows and analytics basics.', category: 'data', link: '#', duration: '5 weeks' }
    ];

    const userNameDisplay = document.getElementById('userNameDisplay');
    const logoutBtn = document.getElementById('logoutBtn');
    const searchInput = document.getElementById('searchInput');
    const categoryFilter = document.getElementById('categoryFilter');
    const clearBtn = document.getElementById('clearBtn');
    const searchResults = document.getElementById('searchResults');
    const coursesContainer = document.getElementById('coursesContainer');

    const userData = JSON.parse(localStorage.getItem('user') || 'null');
    const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';

    if (!userData || !isLoggedIn) {
      window.location.replace('login.html');
    } else {
      userNameDisplay.textContent = userData.username || userData.email || 'User';
    }

    logoutBtn.addEventListener('click', () => {
      localStorage.removeItem('isLoggedIn');
      localStorage.removeItem('user');
      window.location.replace('login.html');
    });

    function escapeHtml(text) {
      return String(text ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function renderCourses(courses) {
      coursesContainer.innerHTML = '';
      if (!courses.length) {
        coursesContainer.innerHTML = '<p class="col-span-full text-center text-gray-500 py-10">No courses found for current filters.</p>';
        searchResults.textContent = '0 courses shown';
        return;
      }

      courses.forEach((course) => {
        const card = document.createElement('article');
        card.className = 'course-card bg-white border border-gray-200 rounded-xl p-6 shadow-sm hover:shadow-md transition';
        card.dataset.category = (course.category || '').toLowerCase();
        card.dataset.title = (course.title || '').toLowerCase();
        card.dataset.description = (course.description || '').toLowerCase();
        card.innerHTML = `
          <p class="text-xs uppercase tracking-widest text-indigo-600 font-bold">${escapeHtml(course.category || 'general')}</p>
          <h3 class="mt-2 text-xl font-bold text-gray-900">${escapeHtml(course.title || 'Untitled Course')}</h3>
          <p class="mt-2 text-sm text-gray-600 min-h-12">${escapeHtml(course.description || 'No description provided.')}</p>
          <div class="mt-4 flex items-center justify-between">
            <span class="text-xs text-gray-500">${escapeHtml(course.duration || 'Self-paced')}</span>
            <a href="${escapeHtml(course.link || '#')}" target="_blank" rel="noopener noreferrer" class="px-3 py-2 bg-indigo-600 text-white text-sm rounded-lg hover:bg-indigo-700">Start</a>
          </div>
        `;
        coursesContainer.appendChild(card);
      });

      searchResults.textContent = courses.length + ' courses shown';
    }

    function runFilters() {
      const term = searchInput.value.trim().toLowerCase();
      const selectedCategory = categoryFilter.value.toLowerCase();
      const cards = [...document.querySelectorAll('.course-card')];
      let visibleCount = 0;

      cards.forEach((card) => {
        const matchesTerm = card.dataset.title.includes(term) || card.dataset.description.includes(term);
        const matchesCategory = !selectedCategory || card.dataset.category === selectedCategory;
        const visible = matchesTerm && matchesCategory;
        card.style.display = visible ? '' : 'none';
        if (visible) visibleCount += 1;
      });

      searchResults.textContent = visibleCount + ' courses shown';
    }

    function populateCategories(courses) {
      const unique = [...new Set(courses.map((c) => (c.category || '').toLowerCase()).filter(Boolean))];
      unique.sort();
      unique.forEach((category) => {
        const option = document.createElement('option');
        option.value = category;
        option.textContent = category.charAt(0).toUpperCase() + category.slice(1);
        categoryFilter.appendChild(option);
      });
    }

    async function loadCourses() {
      try {
        const response = await fetch(API_BASE + '/api/courses', { headers: { 'Content-Type': 'application/json' } });
        if (!response.ok) throw new Error('Failed to load courses');
        const data = await response.json();
        const courses = Array.isArray(data) && data.length ? data : fallbackCourses;
        populateCategories(courses);
        renderCourses(courses);
        // Re-apply active filters for users who typed before data finished loading.
        runFilters();
      } catch (error) {
        console.error('Course fetch error:', error);
        populateCategories(fallbackCourses);
        renderCourses(fallbackCourses);
        // Keep UX consistent: fallback results should still respect current filters.
        runFilters();
        if (!searchInput.value.trim() && !categoryFilter.value) {
          searchResults.textContent = 'Showing fallback courses (backend temporarily unavailable)';
        }
      }
    }

    searchInput.addEventListener('input', runFilters);
    categoryFilter.addEventListener('change', runFilters);
    clearBtn.addEventListener('click', () => {
      searchInput.value = '';
      categoryFilter.value = '';
      runFilters();
    });

    loadCourses();
  </script>
</body>
</html>
