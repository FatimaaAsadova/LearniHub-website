<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Learnihub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { transition: all 0.3s ease; }
    input:focus { outline: none; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2); }
  </style>
</head>

<body class="bg-gray-50">

  <header class="bg-white shadow-md border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
      <h1 class="text-2xl font-bold text-indigo-600"><a href="index.html">Learnihub</a></h1>
      <nav class="hidden md:flex items-center gap-6">
        <a href="index.html" class="text-gray-700 hover:text-indigo-600 font-medium">Home</a>
        <a href="login.html" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-medium text-sm">Sign In</a>
      </nav>
    </div>
  </header>

  <main class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white rounded-xl shadow-xl p-8 border border-gray-100">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-900">Create Account</h1>
        <p class="text-gray-500 mt-2 italic">Join Learnihub</p>
      </div>

      <form id="registerForm" class="space-y-5">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Full Name</label>
          <input type="text" id="username" placeholder="Fatima Asadova" class="w-full px-4 py-2 border rounded-lg focus:border-indigo-500" required>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" class="w-full px-4 py-2 border rounded-lg focus:border-indigo-500" required>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
          <input type="password" id="password" placeholder="••••••••" class="w-full px-4 py-2 border rounded-lg focus:border-indigo-500" required>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="••••••••" class="w-full px-4 py-2 border rounded-lg focus:border-indigo-500" required>
        </div>

        <div id="message" class="text-center text-sm font-medium hidden border p-2 rounded-lg"></div>

        <button type="submit" id="submitBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg shadow-lg transform active:scale-95 transition-all">
          Create Account
        </button>
      </form>
    </div>
  </main>

  <script>
    const form = document.getElementById('registerForm');
    const messageDiv = document.getElementById('message');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        showMessage("❌ Şifrələr eyni deyil!", "text-red-600 bg-red-50 border-red-200");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerText = "Processing...";

      try {
        // Render ünvanını bura dəqiq əlavə etdik
        const response = await fetch('https://learnihub-backend.onrender.com/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password }) 
        });

        const result = await response.json();

        if (response.ok) {
          showMessage("✅ Uğurlu! İndi giriş edə bilərsiniz.", "text-green-600 bg-green-50 border-green-200");
          form.reset();
          setTimeout(() => window.location.href = 'login.html', 2000);
        } else {
          // Bu hissə eyni email xətasını tutub göstərəcək
          showMessage("❌ Xəta: " + result.error, "text-red-600 bg-red-50 border-red-200");
        }
      } catch (err) {
        showMessage("❌ Serverə qoşulmaq mümkün olmadı!", "text-red-600 bg-red-50 border-red-200");
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerText = "Create Account";
      }
    });

    function showMessage(text, colorClass) {
      messageDiv.innerText = text;
      messageDiv.className = `text-center text-sm font-medium p-2 rounded-lg ${colorClass}`;
      messageDiv.classList.remove('hidden');
    }
  </script>
</body>
</html>
