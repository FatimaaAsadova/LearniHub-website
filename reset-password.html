<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Şifrəni Yenilə — Learnihub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
    
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background-color: #fcfaf2; 
    }

    .auth-card {
      background-color: #f2ead3; 
      border-radius: 40px;
      border: 1px solid #e5dec5;
    }

    .input-style { 
      background-color: #ebe4cf; 
      border: 1px solid #b5af9a; 
      transition: all 0.3s ease; 
      color: #4a4a4a;
    }

    .input-style:focus { 
      outline: none; 
      border-color: #5e4d74;
      background-color: #fff;
    }

    .btn-panel {
      background-color: #5e4d74;
      color: white;
      border-radius: 24px;
      transition: transform 0.2s ease, background-color 0.2s ease;
    }

    .btn-panel:hover {
      background-color: #4d3f5f;
      transform: translateY(-1px);
    }
  </style>
</head>
<body class="min-h-screen flex flex-col text-gray-900">
  
  <header class="max-w-7xl mx-auto w-full px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-4">
      <a href="login.html" class="group flex items-center text-gray-600 hover:text-[#5e4d74] transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        <span class="text-sm font-bold uppercase tracking-wider">Geri</span>
      </a>
    </div>
  </header>

  <main class="flex-1 flex items-center justify-center p-4">
    <div class="auth-card w-full max-w-md p-8 md:p-10 shadow-sm">
      <div class="mb-8 text-left">
        <h1 class="text-2xl font-bold text-gray-900">Yeni şifrə təyin edin</h1>
        <p class="text-gray-600 mt-2 text-sm font-medium">Hesabınız üçün yeni və təhlükəsiz şifrə daxil edin.</p>
      </div>

      <form id="updatePasswordForm" class="space-y-5">
        <div>
          <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2">YENİ ŞİFRƏ</label>
          <input type="password" id="newPassword" class="input-style w-full px-4 py-3.5 rounded-2xl text-sm font-semibold" placeholder="••••••••" required minlength="6">
        </div>
        <div>
          <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2">ŞİFRƏNİ TƏSDİQLƏYİN</label>
          <input type="password" id="confirmPassword" class="input-style w-full px-4 py-3.5 rounded-2xl text-sm font-semibold" placeholder="••••••••" required minlength="6">
        </div>
        
        <div id="updateMessage" class="hidden p-3 rounded-xl text-xs font-bold text-center"></div>
        
        <button type="submit" id="updateBtn" class="btn-panel w-full font-bold py-4 transition-all text-sm uppercase tracking-[2px]">Şifrəni Yenilə</button>
      </form>
    </div>
  </main>

  <script>
    // Supabase Configuration
    const _supabaseUrl = "https://sqgphrdkthiixeikialy.supabase.co"; 
    const _supabaseKey = "sb_publishable_ysE34rB_P609-Mw6u_Tcug_JNZRylrq";
    const supabaseClient = supabase.createClient(_supabaseUrl, _supabaseKey);

    document.getElementById('updatePasswordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const btn = document.getElementById('updateBtn');
      const msg = document.getElementById('updateMessage');

      // Check if passwords match
      if (newPassword !== confirmPassword) {
        msg.innerText = "Şifrələr uyğun gəlmir!";
        msg.className = "p-3 rounded-xl text-xs font-bold text-center bg-red-100 text-red-700 block mb-4";
        msg.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btn.innerText = "Yenilənir...";

      const { error } = await supabaseClient.auth.updateUser({
        password: newPassword
      });

      if (error) {
        msg.innerText = "Xəta: " + error.message;
        msg.className = "p-3 rounded-xl text-xs font-bold text-center bg-red-100 text-red-700 block mb-4";
        msg.classList.remove('hidden');
        btn.disabled = false;
        btn.innerText = "Şifrəni Yenilə";
      } else {
        msg.innerText = "Şifrəniz uğurla yeniləndi! Giriş səhifəsinə yönləndirilirsiniz...";
        msg.className = "p-3 rounded-xl text-xs font-bold text-center bg-green-100 text-green-700 block mb-4";
        msg.classList.remove('hidden');
        
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 3000);
      }
    });
  </script>
</body>
</html>
