<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback — Learnihub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Sessiya yoxlanışı
        const hasSession = localStorage.getItem('isLoggedIn') === 'true';
        if (!hasSession) {
            window.location.replace('login.html');
        }
    </script>
</head>
<body class="bg-white">
    <div class="flex flex-col h-screen md:flex-row">
        <aside class="flex flex-col w-64 h-screen px-4 py-8 overflow-y-auto bg-white border-r">
            <h2 class="text-3xl font-semibold text-indigo-600 px-5">
                <a href="index.html">Learnihub</a>
            </h2>
            <div class="flex flex-col justify-between flex-1 mt-6">
                <nav>
                    <a class="flex items-center px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg" href="courses.html">
                        <span class="mx-4 font-medium">My Courses</span>
                    </a>
                    <a class="flex items-center px-4 py-2 mt-5 text-gray-700 bg-gray-100 rounded-lg" href="survey.html">
                        <span class="mx-4 font-medium">Add Feedback</span>
                    </a>
                    <a class="flex items-center px-4 py-2 mt-5 text-gray-600 hover:bg-gray-100 rounded-lg" href="admin.html">
                        <span class="mx-4 font-medium">Admin</span>
                    </a>
                    <a class="flex items-center px-4 py-2 mt-5 text-gray-600 hover:bg-gray-100 rounded-lg" href="index.html">
                        <span class="mx-4 font-medium">Home Page</span>
                    </a>
                </nav>
                <div class="mt-6 border-t pt-6 px-4">
                    <p id="userEmailDisplay" class="text-sm font-medium text-gray-900 truncate italic"></p>
                    <button id="logoutBtn" class="w-full text-left py-2 mt-2 text-red-600 font-bold hover:bg-red-50 rounded-lg transition">
                        Logout
                    </button>
                </div>
            </div>
        </aside>

        <main class="flex-1 h-screen overflow-y-auto bg-gray-50 p-6 lg:p-10">
            <div class="max-w-2xl mx-auto">
                <h1 class="text-2xl font-bold text-gray-800 mb-8">Course <span class="text-indigo-600">Feedback</span></h1>
                
                <div class="bg-white rounded-2xl shadow-sm border p-8">
                    <form id="surveyForm" class="space-y-5">
                        <div>
                            <label class="text-sm font-bold text-gray-700 mb-2 block">FULL NAME</label>
                            <input type="text" id="full_name" placeholder="Fatima Asadova" class="block w-full px-4 py-3 border border-gray-200 rounded-xl outline-none focus:border-indigo-500">
                        </div>
                        <div>
                            <label class="text-sm font-bold text-gray-700 mb-2 block">COURSE NAME *</label>
                            <input type="text" id="course_name" required placeholder="e.g. AP Calculus" class="block w-full px-4 py-3 border border-gray-200 rounded-xl outline-none focus:border-indigo-500">
                        </div>
                        <div>
                            <label class="text-sm font-bold text-gray-700 mb-2 block">COURSE LINK *</label>
                            <input type="url" id="course_link" required placeholder="https://..." class="block w-full px-4 py-3 border border-gray-200 rounded-xl outline-none focus:border-indigo-500">
                        </div>
                        <div>
                            <label class="text-sm font-bold text-gray-700 mb-2 block">CATEGORY</label>
                            <select id="category" class="block w-full px-4 py-3 border border-gray-200 rounded-xl outline-none cursor-pointer focus:border-indigo-500">
                                <option value="math">Math</option>
                                <option value="development">Development</option>
                                <option value="design">Design</option>
                                <option value="language">Language</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-sm font-bold text-gray-700 mb-2 block">DESCRIPTION</label>
                            <textarea id="description" rows="4" placeholder="Briefly describe..." class="block w-full px-4 py-3 border border-gray-200 rounded-xl outline-none focus:border-indigo-500"></textarea>
                        </div>

                        <div id="message" class="hidden p-4 rounded-xl text-sm font-medium"></div>

                        <button type="submit" id="surveySubmitBtn" class="w-full px-6 py-4 text-white bg-indigo-600 rounded-xl hover:bg-indigo-500 font-bold shadow-lg transition disabled:opacity-50">
                            Submit Feedback
                        </button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script>
        // 1. İstifadəçi məlumatlarını və email ekranını idarə et
        const userData = JSON.parse(localStorage.getItem('user')) || {};
        const emailDisplay = document.getElementById('userEmailDisplay');
        if (userData.email && emailDisplay) {
            emailDisplay.textContent = userData.email;
        }
    
        // 2. Logout funksiyası (Bütün keşləri təmizləyir)
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', () => {
                localStorage.clear();
                window.location.replace('login.html');
            });
        }
    
        const surveyForm = document.getElementById('surveyForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('surveySubmitBtn');
    
        if (surveyForm) {
            surveyForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                // ELEMENTLƏRİN MÖVCUDLUĞUNU YOXLA (Xətanın qarşısını almaq üçün)
                const nameField = document.getElementById('full_name');
                const courseField = document.getElementById('course_name');
                const linkField = document.getElementById('course_link');
                const categoryField = document.getElementById('category');
                const descField = document.getElementById('description');
    
                // Əgər elementlərdən biri belə tapılmasa, konsolda bizə xəbər verəcək
                if (!courseField || !linkField) {
                    console.error("KRİTİK XƏTA: HTML-də ID-lər tapılmadı! 'course_name' və 'course_link' ID-lərini yoxla.");
                    return;
                }
    
                const fName = nameField.value.trim();
                const cName = courseField.value.trim();
                const cLink = linkField.value.trim();
                const cCat = categoryField.value;
                const cDesc = descField.value.trim();
    
                // DEBUG: Düyməyə basanda nə oxuduğunu görmək üçün (F12 Console-da bax)
                console.log("Göndərilən Məlumat:", { cName, cLink });
    
                // Mesaj bölməsini təmizlə
                messageDiv.classList.add('hidden');
                messageDiv.className = "p-4 rounded-xl text-sm font-medium hidden";
    
                // Validasiya (Əsas problem buradadır)
                if (!cName || !cLink) {
                    messageDiv.innerText = "❌ Kurs adı və Kurs linki mütləqdir!";
                    messageDiv.className = "p-4 rounded-xl text-sm font-medium bg-red-50 text-red-700 block mb-4";
                    messageDiv.classList.remove('hidden');
                    return;
                }
    
                submitBtn.disabled = true;
                submitBtn.innerText = "Sending...";
    
                const payload = {
                    full_name: fName || "Fatima Asadova",
                    course_name: cName,
                    link: cLink, 
                    category: cCat,
                    description: cDesc
                };
    
                try {
                    const response = await fetch('https://learnihub-backend.onrender.com/api/survey', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
    
                    const result = await response.json();
    
                    if (response.ok) {
                        messageDiv.innerText = "✅ Feedback uğurla göndərildi!";
                        messageDiv.className = "p-4 rounded-xl text-sm font-medium bg-green-50 text-green-700 block mb-4";
                        messageDiv.classList.remove('hidden');
                        surveyForm.reset();
                    } else {
                        messageDiv.innerText = "❌ Xəta: " + (result.error || "Bazaya yazıla bilmədi.");
                        messageDiv.className = "p-4 rounded-xl text-sm font-medium bg-red-50 text-red-700 block mb-4";
                        messageDiv.classList.remove('hidden');
                    }
                } catch (err) {
                    messageDiv.innerText = "❌ Server bağlantısı uğursuz oldu.";
                    messageDiv.className = "p-4 rounded-xl text-sm font-medium bg-red-50 text-red-700 block mb-4";
                    messageDiv.classList.remove('hidden');
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Submit Feedback";
                }
            });
        }
    </script>
</body>
</html>
